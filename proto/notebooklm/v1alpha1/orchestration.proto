// BulkImportFromResearch (LBwxtb, 5-position polymorphic variant).
// Wire shape:
//   [null, [1], conversation_id, project_id, [source_1, ..., source_N]]
//
// HAR captures show two distinct per-source tuple shapes selected by
// position [10]:
//
//   URL import (api.bulkImportArgs at client.go:5102, source_type=2):
//     [null, null, [url, title], null × 7, 2]
//
//   Note/text import (HAR-observed in
//   NotebookLM web UI capture, 2026-04-23, importing a 3.4kB markdown
//   research report,
//   source_type=3):
//     [null, [title, content_markdown], null, 3, null × 5, 3]
//
// The Go side currently encodes only the URL variant; the note variant
// is a follow-up. BulkImportSourceInput carries enough fields to model
// both — content stays empty for URL imports, url stays empty for
// note imports.
message BulkImportFromResearchRequest {
    string project_id = 1;
    string conversation_id = 2;
    repeated BulkImportSourceInput sources = 3;
}

message BulkImportSourceInput {
    string url = 1;
    string title = 2;
    // content holds inline markdown when this source is a note/text
    // import (type=3). Leave empty for URL imports (type=2).
    string content = 3;
    // source_type matches the trailing enum int in the wire tuple:
    //   2 = URL  (url + title populated)
    //   3 = NOTE (title + content populated)
    int32 source_type = 4;
}

// BulkImportFromResearchResponse — per-source enriched metadata in
// request order. HAR shows a wide layout; we surface the durable
// subset (id, title, url) and leave the rest to future callers.
message BulkImportFromResearchResponse {
    repeated BulkImportResult results = 1;
}

message BulkImportResult {
    string source_id = 1;
    string title = 2;
    string url = 3;
}

// GetAudioFormats (sqTeoe). HAR-verified against 11+ captures
// (notebooklm.google.com.jsonl, 2026-04-19..2026-04-23). Returns the
// full create-artifact menu — audio styles, video styles, slide
// styles, AND the prebuilt briefing-doc/study-guide templates. The
// request is a fixed-sentinel payload (no varying fields), so it has
// no arg_format. The same RPC powers every "create X" picker the UI
// shows.
message GetAudioFormatsRequest {
    // Wire shape: [[2, null, null, [1, null × 9, [1]], [[1,4,2,3,6,5]]], null, 1]
    // Custom encoder; no field substitution.
}

// Response shape (HAR-verified):
//   [
//     [<audio_kinds>],     // [[id, name, description], ...]
//     [<video_kinds>],
//     [<slide_kinds>],
//     [<doc_templates>],   // [title, subtitle, system_prompt]
//     ...,
//   ]
//
// We surface only the audio kinds today (the existing api.Client.GetAudioFormats
// path); other inner arrays are accessible via the raw payload until
// dedicated parsers exist.
message GetAudioFormatsResponse {
    repeated AudioFormat formats = 1;
}

// AudioFormat captured kinds (HAR 2026-04-19+):
//   1 = "Deep Dive"  — two-host conversation
//   2 = "Brief"      — bite-sized overview
//   3 = "Critique"   — expert review w/ feedback
//   4 = "Debate"     — two-host opposing perspectives
message AudioFormat {
    int32 id = 1;
    string name = 2;
    string description = 3;
}

// GenerateDocumentGuides (tr032e): per-source guide.
// Wire shape: [[[[source_id]]]]
// Response: [[[null, [summary], [[topic, ...]], []]]]
// Note: the existing GenerateDocumentGuidesRequest at line ~709 keys
// off project_id, but the live wire call keys off source_id. The
// response message GenerateDocumentGuidesResponse is defined in
// notebooklm.proto:163 and reused here.

// LogEvent (ozz5Z) is a misnomer per rpc.go's constant; the wire RPC is
// actually a promo/upsell-card placement lookup. HAR-verified across
// 12+ captures (notebooklm.google.com.jsonl, 2026-04-19..2026-04-23).
//
// Wire request:
//   [[[[null, "1", 627], [null × 9, [null, null, 2]], 1]]]
//
// 627 is the campaign/slot id (constant across all captures); "1" is
// locale/surface; the [null, null, 2] tail at position [9] of the
// inner array is opaque. The whole request is a fixed sentinel — the
// only varying byte is the f.sid, which lives outside the f.req body.
// No Go caller invokes this RPC today; the message exists so future
// regenerated stubs match the wire reality rather than the rpc.go
// label.
message LogEventRequest {
    // No fields: the request is a constant sentinel envelope.
}

// Wire response carries the upsell card payload. Captured layout
// (heavily nested; only the surfaceable subset is decoded here):
//   [[[
//     [null, "1", 627],
//     [[1601, [null × 9,
//       [[null, "NotebookLM icon", "edit"],
//        [[[null, null, "<settings_url>"], false], null, null,
//         "Manage subscription", null, "Manage subscription",
//         null, null, [<dismissal_blob>]]]],
//      null × 8, "NOTEBOOKLM_TIER_PRO_CONSUMER_USER", null, null, false]],
//     0]]]
//
// We surface the user-tier string (the only durable, human-meaningful
// field). All other content is rendering metadata.
message LogEventResponse {
    string user_tier = 1;
    // Example value: "NOTEBOOKLM_TIER_PRO_CONSUMER_USER".
}

