// Orchestration service definitions discovered from JavaScript analysis
syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/empty.proto";
import "notebooklm/v1alpha1/rpc_extensions.proto";
import "notebooklm/v1alpha1/notebooklm.proto";

package notebooklm.v1alpha1;

option go_package = "github.com/tmc/nlm/gen/notebooklm/v1alpha1;notebooklm";

// Additional messages for orchestration

message Context {
    // Context information, structure inferred from usage
    string project_id = 1;
    repeated string source_ids = 2;
}

message Artifact {
    string artifact_id = 1;
    string project_id = 2;
    ArtifactType type = 3;
    repeated ArtifactSource sources = 4;
    ArtifactState state = 5;
    Source note = 7;  // Note is a special type of Source
    AudioOverview audio_overview = 8;
    Report tailored_report = 9;
    App app = 10;
    VideoOverview video_overview = 11;  // Video overview artifact
}

enum ArtifactType {
    ARTIFACT_TYPE_UNSPECIFIED = 0;
    ARTIFACT_TYPE_NOTE = 1;
    ARTIFACT_TYPE_AUDIO_OVERVIEW = 2;
    ARTIFACT_TYPE_VIDEO_OVERVIEW = 3;  // Video overview (confirmed from /tmp/notebooklm3.har)
    ARTIFACT_TYPE_REPORT = 4;
    ARTIFACT_TYPE_APP = 5;
    ARTIFACT_TYPE_8 = 8;
}

enum ArtifactState {
    ARTIFACT_STATE_UNSPECIFIED = 0;
    ARTIFACT_STATE_CREATING = 1;
    ARTIFACT_STATE_READY = 2;
    ARTIFACT_STATE_FAILED = 3;
    ARTIFACT_STATE_SUGGESTED = 4;
    ARTIFACT_STATE_7 = 7;
    ARTIFACT_STATE_8 = 8;
    ARTIFACT_STATE_9 = 9;
}

message ArtifactSource {
    SourceId source_id = 1;
    repeated TextFragment text_fragments = 2;
}

message TextFragment {
    string text = 1;
    int32 start_offset = 2;
    int32 end_offset = 3;
}

message Report {
    string title = 1;
    string content = 2;
    repeated Section sections = 3;
}

message Section {
    string title = 1;
    string content = 2;
}

message App {
    string app_id = 1;
    string name = 2;
    string description = 3;
}

// Request/Response messages for LabsTailwindOrchestrationService

message CreateArtifactRequest {
    Context context = 1;
    string project_id = 2;
    Artifact artifact = 3;
}

// GetArtifactRequest. The wire id is v9rmvd (per JS bundle binding to
// /LabsTailwindOrchestrationService.GetArtifact). The web UI never
// fires this RPC, preferring a gArtLc scan + filter, so the request
// shape is unverified by HAR. arg_format = "[%artifact_id%]" is the
// likely shape based on sibling artifact RPCs.
message GetArtifactRequest {
    string artifact_id = 1;
}

message UpdateArtifactRequest {
    Artifact artifact = 1;
    google.protobuf.FieldMask update_mask = 2;
}

message RenameArtifactRequest {
    string artifact_id = 1;
    string new_title = 2;
}

message DeleteArtifactRequest {
    string artifact_id = 1;
}

message ListArtifactsRequest {
    string project_id = 1;
    int32 page_size = 2;
    string page_token = 3;
}

message ListArtifactsResponse {
    repeated Artifact artifacts = 1;
    string next_page_token = 2;
}

message QueryArtifactsRequest {
    repeated int32 artifact_types = 1;
    string project_id = 2;
    string filter = 3;
}

message QueryArtifactsResponse {
    repeated Artifact artifacts = 1;
}

message ActOnSourcesRequest {
    string project_id = 1;
    string action = 2;
    repeated string source_ids = 3;
}

// Audio style types (confirmed from sqTeoe RPC in HAR analysis)
enum AudioType {
    AUDIO_TYPE_UNSPECIFIED = 0;
    AUDIO_TYPE_DEEP_DIVE = 1;      // "A lively conversation between two hosts, unpacking and connecting topics"
    AUDIO_TYPE_BRIEF = 2;          // "A bite-sized overview to help you grasp the core ideas quickly"
    AUDIO_TYPE_CRITIQUE = 3;       // "An expert review offering constructive feedback"
    AUDIO_TYPE_DEBATE = 4;         // "A thoughtful debate illuminating different perspectives"
}

// Audio length options (confirmed from /tmp/notebooklm2.har analysis)
enum AudioLength {
    AUDIO_LENGTH_UNSPECIFIED = 0;
    AUDIO_LENGTH_SHORT = 1;        // Shorter audio overview
    AUDIO_LENGTH_DEFAULT = 2;      // ~10-15 minutes
    AUDIO_LENGTH_LONG = 3;         // ~15-20 minutes (longer)
}

// Video style options (confirmed from /tmp/notebooklm3.har analysis)
enum VideoStyle {
    VIDEO_STYLE_UNSPECIFIED = 0;
    VIDEO_STYLE_AUTOSELECT = 1;    // Let system choose the best style
    VIDEO_STYLE_CLASSIC = 2;       // Classic presentation style
    VIDEO_STYLE_WHITEBOARD = 3;    // Whiteboard-style presentation
}

// Guide type for GenerateNotebookGuide (confirmed from /tmp/notebooklm3.har analysis)
enum GuideType {
    GUIDE_TYPE_UNSPECIFIED = 0;
    GUIDE_TYPE_OUTLINE = 1;        // Text outline
    GUIDE_TYPE_MIND_MAP = 2;       // Mind map visualization
}

message CreateAudioOverviewRequest {
    string project_id = 1;
    AudioType audio_type = 2;
    repeated string source_ids = 3;
    string custom_instructions = 4;
    AudioLength length = 5;
    string language = 6;  // e.g. "en"
}

// Video overview request (uses same R7cb6c RPC as audio, but with mode=3 parameter)
message CreateVideoOverviewRequest {
    string project_id = 1;
    AudioType audio_type = 2;      // Content style (only BRIEF=2 observed so far)
    repeated string source_ids = 3;
    string custom_instructions = 4;
    VideoStyle video_style = 5;    // Visual presentation style
    string language = 6;           // e.g. "en"
}

message GetAudioOverviewRequest {
    string project_id = 1;
    int32 request_type = 2;
}

message DeleteAudioOverviewRequest {
    string project_id = 1;
}

message DiscoverSourcesRequest {
    string project_id = 1;
    string query = 2;
}

message DiscoverSourcesResponse {
    repeated Source sources = 1;
}

message GenerateFreeFormStreamedHistoryEntry {
    // Wire shape: [content, null, role]
    string content = 1;
    int32 role = 3;  // 1 = user, 2 = assistant
}

message GenerateFreeFormStreamedOptions {
    // Observed default request options: [2, null, [1], [1]]
    int32 mode = 1;
    repeated int32 citation_modes = 3;
    repeated int32 follow_up_modes = 4;
}

message GenerateFreeFormStreamedRequest {
    // The gRPC-Web endpoint still expects a manually constructed JSON array,
    // but this message mirrors the observed request state on that wire:
    //   [
    //     [[[source_ids]]],
    //     prompt,
    //     history,
    //     [mode, null, citation_modes, follow_up_modes],
    //     conversation_id,
    //     draft_response_id,
    //     parent_response_id,
    //     notebook_id,
    //     sequence_number
    //   ]
    string project_id = 1;
    string prompt = 2;
    repeated string source_ids = 3;
    repeated GenerateFreeFormStreamedHistoryEntry history = 4;
    GenerateFreeFormStreamedOptions options = 5;
    string conversation_id = 6;
    string draft_response_id = 7;
    string parent_response_id = 8;
    string notebook_id = 9;
    int32 sequence_number = 10;
}

message ChatConversationMetadata {
    string conversation_id = 1;
    string message_id = 2;
    int32 sequence_number = 3;
}

message ChatCharacterRange {
    int32 start = 1;
    int32 end = 2;
}

message ChatCitationSegment {
    ChatCharacterRange range = 1;
    string text = 2;
    bool emphasized = 3;
}

message ChatCitationExcerpt {
    ChatCharacterRange range = 1;
    repeated ChatCitationSegment segments = 2;
}

message ChatCitation {
    double confidence = 1;
    repeated ChatCharacterRange ranges = 2;
    repeated ChatCitationExcerpt excerpts = 3;
}

message ChatSourceMapping {
    ChatCharacterRange range = 1;
    repeated int32 source_indices = 2;
}

message ChatFollowUp {
    string text = 1;
    int32 type = 2;
}

message GenerateFreeFormStreamedResponse {
    // chunk preserves the cumulative answer text used by existing callers.
    string chunk = 1;
    // is_final mirrors the completion flag at response position [4].
    bool is_final = 2;
    ChatConversationMetadata conversation = 3;
    repeated ChatCitation citations = 4;
    repeated ChatSourceMapping source_mappings = 5;
    repeated string follow_up_text = 6;
    repeated ChatFollowUp follow_ups = 7;
}

message GenerateReportSuggestionsRequest {
    string project_id = 1;
    repeated string source_ids = 2;
}

message ReportSuggestion {
    string title = 1;
    string description = 2;
    // field 3 is null in observed responses
    repeated string source_ids = 4;
    string prompt = 5;
    int32 count = 6;
}

message GenerateReportSuggestionsResponse {
    repeated ReportSuggestion suggestions = 1;
}


message GetProjectAnalyticsRequest {
    string project_id = 1;
}

message ProjectAnalytics {
    google.protobuf.Int32Value source_count = 1;
    google.protobuf.Int32Value note_count = 2;
    google.protobuf.Int32Value audio_overview_count = 3;
    google.protobuf.Timestamp last_accessed = 4;
}

message ListFeaturedProjectsRequest {}

message FeaturedProjectImage {
    string url = 1;
}

message FeaturedProjectPresentation {
    bool curated = 1;
    repeated FeaturedProjectImage images = 2;
    string provider = 3;
    string description = 4;
}

message FeaturedProject {
    string title = 1;
    repeated Source sources = 2;
    string project_id = 3;
    string emoji = 4;
    ProjectMetadata metadata = 6;
    ChatbotConfig chatbot_config = 8;
    FeaturedProjectPresentation presentation = 15;
}

message ListFeaturedProjectsResponse {
    repeated FeaturedProject projects = 1;
}

// Update existing request messages to match Gemini's findings
message AddSourceRequest {
    repeated SourceInput sources = 1;
    string project_id = 2;
}

message SourceInput {
    // For text sources
    string title = 1;
    string content = 2;
    
    // For file upload
    string base64_content = 3;
    string filename = 4;
    string mime_type = 5;
    
    // For URL sources
    string url = 6;
    
    // For YouTube
    string youtube_video_id = 7;
    
    SourceType source_type = 8;
}

message CreateNoteRequest {
    string project_id = 1;
    string content = 2;
    repeated int32 note_type = 3;
    string title = 5;
}

message DeleteNotesRequest {
    string project_id = 1;
    repeated string note_ids = 3;
}

message GetNotesRequest {
    string project_id = 1;
}

message MutateNoteRequest {
    string project_id = 1;
    string note_id = 2;
    repeated NoteUpdate updates = 3;
}

message NoteUpdate {
    string content = 1;
    string title = 2;
    repeated string tags = 3;
}

// Account management
message GetOrCreateAccountRequest {
    // Empty for now, uses auth token
}

message MutateAccountRequest {
    Account account = 1;
    google.protobuf.FieldMask update_mask = 2;
}

message Account {
    string account_id = 1;
    string email = 2;
    AccountSettings settings = 3;
}

message AccountSettings {
    bool email_notifications = 1;
    string default_project_emoji = 2;
}

// Service definition
service LabsTailwindOrchestrationService {
    option (batchexecute_app) = "LabsTailwindUi";
    option (batchexecute_host) = "notebooklm.google.com";
    
    // Artifact operations
    rpc CreateArtifact(CreateArtifactRequest) returns (Artifact) {
        option (rpc_id) = "xpWGLf";
        option (arg_format) = "[%context%, %project_id%, %artifact%]";
    }
    // GetArtifact (v9rmvd). The JS bundle binds v9rmvd to
    // /LabsTailwindOrchestrationService.GetArtifact, so the RPC does
    // exist on the wire — it just isn't invoked by the live web UI,
    // which prefers gArtLc (ListArtifacts) + client-side filter for
    // its rendering path. The earlier BnLyuf id was a different,
    // unreachable inference that returned 400.
    //
    // No HAR evidence in the surveyed corpus (the UI never fires this
    // ID). api.Client.GetArtifact still uses the gArtLc scan fallback;
    // a future direct caller can target v9rmvd once a wire shape is
    // captured.
    //
    // TODO(har): capture the request/response shape by hitting v9rmvd
    // directly (e.g., from a custom JS console snippet) and refine
    // GetArtifactRequest/Response.
    rpc GetArtifact(GetArtifactRequest) returns (Artifact) {
        option (rpc_id) = "v9rmvd";
        option (arg_format) = "[%artifact_id%]";
    }
    rpc UpdateArtifact(UpdateArtifactRequest) returns (Artifact) {
        option (rpc_id) = "DJezBc";
        option (arg_format) = "[%artifact%, %update_mask%]";
    }
    rpc RenameArtifact(RenameArtifactRequest) returns (Artifact) {
        option (rpc_id) = "rc3d8d";
        // Manual encoder in gen/method/LabsTailwindOrchestrationService_RenameArtifact_encoder.go
        // Format: [[artifactID, newTitle], [["title"]]]
    }
    rpc DeleteArtifact(DeleteArtifactRequest) returns (google.protobuf.Empty) {
        // HAR-verified 2026-04-07 against project
        // 00000000-0000-4000-8000-000000000005 (two successive deletes,
        // byte-identical options blob; both returned []). Earlier
        // WxBZtb inference returned 400 against the live server.
        // See rpc.go:125 and
        // internal/method/LabsTailwindOrchestrationService_DeleteArtifact_encoder.go.
        //
        // Wire shape (custom Go encoder; arg_format cannot express the
        // fixed-sentinel options blob):
        //   [[2, null, null, [1, null × 9, [1]], [[1,4,2,3,6,5]]],
        //    artifact_id]
        // Position [0] is the same options blob carried by AddFileSource
        // (o4cbdc) — Google's pattern for "this is a write-against-the-
        // notebook" calls.
        option (rpc_id) = "V5N4be";
    }
    rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse) {
        // The web UI reads the artifact list via gArtLc (QueryArtifacts).
        // No distinct LfTXoe wire call has been observed; the earlier ID
        // is treated as dead. See rpc.go:126.
        option (rpc_id) = "gArtLc";
        option (arg_format) = "[%project_id%, %page_size%, %page_token%]";
    }
    rpc QueryArtifacts(QueryArtifactsRequest) returns (QueryArtifactsResponse) {
        option (rpc_id) = "gArtLc";
        option (arg_format) = "[%artifact_types%, %project_id%, %filter%]";
    }

    // Source operations
    rpc ActOnSources(ActOnSourcesRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "yyryJe";
        option (arg_format) = "[%project_id%, %action%, %source_ids%]";
    }
    rpc AddSources(AddSourceRequest) returns (Project) {
        option (rpc_id) = "izAoDd";
        option (arg_format) = "[%sources%, %project_id%]";
    }
    rpc CheckSourceFreshness(CheckSourceFreshnessRequest) returns (CheckSourceFreshnessResponse) {
        option (rpc_id) = "yR9Yof";
        option (arg_format) = "[%source_id%]";
    }
    rpc DeleteSources(DeleteSourcesRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "tGMBJ";
        option (arg_format) = "[[%source_ids%]]";
    }
    // DiscoverSources (Es3dTe). Per the JS bundle binding to
    // /LabsTailwindOrchestrationService.DiscoverSources. The previous
    // rpc_id "qXyaNe" was a speculative inference that does not match
    // any JS bundle entry or HAR capture; corrected to Es3dTe.
    //
    // No HAR yet for the wire shape. arg_format below is a likely
    // shape based on sibling RPCs but is unverified — TODO(har):
    // capture by triggering "Discover sources" from the source-add
    // UI.
    //
    // Note: the related research-flow RPCs (Ljjv0c, QA9ei, e3bVqc,
    // LBwxtb) are bound by the JS bundle to DiscoverSources*-family
    // names (DiscoverSourcesManifold, DiscoverSourcesAsync,
    // ListDiscoverSourcesJob, FinishDiscoverSourcesRun); the
    // "research" feature is layered on top of the DiscoverSources job
    // system.
    rpc DiscoverSources(DiscoverSourcesRequest) returns (DiscoverSourcesResponse) {
        option (rpc_id) = "Es3dTe";
        option (arg_format) = "[%project_id%, %query%]";
    }
    rpc LoadSource(LoadSourceRequest) returns (Source) {
        option (rpc_id) = "hizoJc";
        option (arg_format) = "[%source_id%]";
    }
    rpc MutateSource(MutateSourceRequest) returns (Source) {
        option (rpc_id) = "b7Wfje";
        option (arg_format) = "[%source_id%, %updates%]";
    }
    rpc RefreshSource(RefreshSourceRequest) returns (Source) {
        option (rpc_id) = "FLmJqe";
        option (arg_format) = "[%source_id%]";
    }
    
    // Audio operations
    rpc CreateAudioOverview(CreateAudioOverviewRequest) returns (AudioOverview) {
        option (rpc_id) = "R7cb6c";
        // Format discovered from HAR analysis:
        // [[audio_type], project_id, [null, null, 1, [[[source_ids]]], null, null,
        //   [null, [custom_instructions, length, null, [[[source_ids]]], language, true, 1]]]]
        // Using custom encoder for this complex structure
    }
    rpc GetAudioOverview(GetAudioOverviewRequest) returns (AudioOverview) {
        option (rpc_id) = "VUsiyb";
        option (arg_format) = "[%project_id%]";
    }
    rpc DeleteAudioOverview(DeleteAudioOverviewRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "sJDbic";
        option (arg_format) = "[%project_id%]";
    }

    // Video operations (uses same R7cb6c RPC as audio but with mode=3)
    rpc CreateVideoOverview(CreateVideoOverviewRequest) returns (VideoOverview) {
        option (rpc_id) = "R7cb6c";
        // Format discovered from HAR analysis:
        // [[audio_type], project_id, [null, null, 3, [[[source_ids]]], null, null, null, null,
        //   [null, null, [[[source_ids]], language, custom_instructions, null, 1, video_style]]]]
        // Using custom encoder for this complex structure
    }
    
    // Note operations
    rpc CreateNote(CreateNoteRequest) returns (Note) {
        option (rpc_id) = "CYK0Xb";
        option (arg_format) = "[%project_id%, %title%, %content%]";
    }
    rpc DeleteNotes(DeleteNotesRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "AH0mwd";
        option (arg_format) = "[%project_id%, null, %note_ids%, [2]]";
    }
    rpc GetNotes(GetNotesRequest) returns (GetNotesResponse) {
        option (rpc_id) = "cFji9";
        option (arg_format) = "[%project_id%]";
    }
    rpc MutateNote(MutateNoteRequest) returns (Note) {
        option (rpc_id) = "cYAfTb";
        option (arg_format) = "[%note_id%, %title%, %content%]";
    }
    
    // Project operations
    rpc CreateProject(CreateProjectRequest) returns (Project) {
        option (rpc_id) = "CCqFvf";
        option (arg_format) = "[%title%, %emoji%]";
    }
    rpc DeleteProjects(DeleteProjectsRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "WWINqb";
        option (arg_format) = "[%project_ids%]";
    }
    rpc GetProject(GetProjectRequest) returns (Project) {
        option (rpc_id) = "rLM1Ne";
        option (arg_format) = "[%project_id%]";
    }
    rpc ListFeaturedProjects(ListFeaturedProjectsRequest) returns (ListFeaturedProjectsResponse) {
        option (rpc_id) = "ub2Bae";
        option (arg_format) = "[[2]]";
    }
    rpc ListRecentlyViewedProjects(ListRecentlyViewedProjectsRequest) returns (ListRecentlyViewedProjectsResponse) {
        option (rpc_id) = "wXbhsf";
        option (arg_format) = "[null, 1, null, [2]]";
        option (chunked_response) = true;
    }
    rpc MutateProject(MutateProjectRequest) returns (Project) {
        option (rpc_id) = "s0tc2d";
        option (arg_format) = "[%project_id%, %updates%]";
    }
    rpc RemoveRecentlyViewedProject(RemoveRecentlyViewedProjectRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "fejl7e";
        option (arg_format) = "[%project_id%]";
    }
    
    // Generation operations
    //
    // Per-source guide generation (tr032e) is not declared here; the wire
    // call is keyed by source_id with a 4-level-nested arg shape that the
    // [%project_id%]-style arg_format cannot express. It's invoked directly
    // via rpc.Do in the api package (see api.Client.GenerateSourceGuide).
    rpc GenerateFreeFormStreamed(GenerateFreeFormStreamedRequest) returns (stream GenerateFreeFormStreamedResponse) {
        // gRPC-Web stream — NOT batchexecute. Requires:
        //   x-goog-ext-353267353-jspb: [null,null,null,282611]
        //   X-Same-Domain: 1
        // The JS bundle binds the rpc_id laWbsf to this same method, but
        // the production surface uses the gRPC-Web endpoint below
        // because batchexecute does not stream. Annotation kept so the
        // bundle->proto reconciliation stays complete.
        option (rpc_id) = "laWbsf";
        option (grpc_endpoint) = "/_/LabsTailwindUi/data/google.internal.labs.tailwind.orchestration.v1.LabsTailwindOrchestrationService/GenerateFreeFormStreamed";
        option (requires_sources) = true;
        // Source IDs use 3-level nesting: [[["source-id"]]]
        option (grpc_arg_format) = "[[%source_ids%], %prompt%, null]";
    }
    rpc GenerateNotebookGuide(GenerateNotebookGuideRequest) returns (GenerateNotebookGuideResponse) {
        option (rpc_id) = "VfAZjd";
        option (arg_format) = "[%project_id%]";
    }
    rpc GenerateOutline(GenerateOutlineRequest) returns (GenerateOutlineResponse) {
        option (rpc_id) = "lCjAd";
        option (arg_format) = "[%project_id%]";
    }
    // GenerateReportSuggestions (ciyUvf). HAR-verified; see
    // internal/method/LabsTailwindOrchestrationService_GenerateReportSuggestions_encoder.go.
    //
    // GHsKob is a legacy/predecessor id for the same logical RPC. It
    // does not appear in the current JS bundle (boq_labs-tailwind-frontend)
    // and has no observed wire traffic. Treat GHsKob as dead; ciyUvf
    // is the live id.
    rpc GenerateReportSuggestions(GenerateReportSuggestionsRequest) returns (GenerateReportSuggestionsResponse) {
        option (rpc_id) = "ciyUvf";
        option (arg_format) = "[%project_id%]";
    }
    rpc GenerateSection(GenerateSectionRequest) returns (GenerateSectionResponse) {
        option (rpc_id) = "BeTrYd";
        option (arg_format) = "[%project_id%]";
    }
    rpc StartDraft(StartDraftRequest) returns (StartDraftResponse) {
        option (rpc_id) = "exXvGf";
        option (arg_format) = "[%project_id%]";
    }
    rpc StartSection(StartSectionRequest) returns (StartSectionResponse) {
        option (rpc_id) = "pGC7gf";
        option (arg_format) = "[%project_id%]";
    }
    rpc GenerateMagicView(GenerateMagicViewRequest) returns (GenerateMagicViewResponse) {
        option (rpc_id) = "uK8f7c";
        option (arg_format) = "[%project_id%, %source_ids%]";
    }
    
    // Analytics and feedback
    rpc GetProjectAnalytics(GetProjectAnalyticsRequest) returns (ProjectAnalytics) {
        option (rpc_id) = "AUrzMb";
        option (arg_format) = "[%project_id%]";
    }
    rpc SubmitFeedback(SubmitFeedbackRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "uNyJKe";
        option (arg_format) = "[%project_id%, %feedback_type%, %feedback_text%]";
    }
    
    // Conversation lifecycle
    rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse) {
        option (rpc_id) = "hPTbtc";
        option (arg_format) = "[[], null, %project_id%, %limit%]";
    }
    rpc GetConversationHistory(GetConversationHistoryRequest) returns (GetConversationHistoryResponse) {
        option (rpc_id) = "khqZz";
        option (arg_format) = "[[], null, null, %conversation_id%, %limit%]";
    }
    rpc DeleteChatHistory(DeleteChatHistoryRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "e3bVqc";
        // Polymorphic endpoint: payload shape [null, null, project_id] selects DeleteChatHistory
        option (arg_format) = "[null, null, %project_id%]";
    }

    // Account operations
    rpc GetOrCreateAccount(GetOrCreateAccountRequest) returns (Account) {
        option (rpc_id) = "ZwVcOc";
        option (arg_format) = "[]";
    }
    rpc MutateAccount(MutateAccountRequest) returns (Account) {
        option (rpc_id) = "hT54vc";
        option (arg_format) = "[%account%, %update_mask%]";
    }

    // Source registration for Resumable Upload (rpc.go:31)
    //
    // Request shape, captured from api.Client.registerFileSource
    // (internal/notebooklm/api/client.go:952):
    //   [[[filename]], project_id, [2], [1, null × 9, [1]]]
    // The arg_format directive cannot express the deeply-nested wrapper;
    // a custom encoder lives at api.Client.registerFileSource. Returns
    // the server-assigned source_id at response position [0][0][0].
    rpc AddFileSource(AddFileSourceRequest) returns (AddFileSourceResponse) {
        option (rpc_id) = "o4cbdc";
        // Wire shape encoded in api/client.go; arg_format omitted because
        // the four-position payload uses fixed sentinel arrays the
        // template language can't represent. Keep the encoder in Go.
