    int32 role = 2; // 1 = user, 2 = assistant
}

// Interactive audio (WebRTC) types
// Reconstructed from JavaScript analysis and HAR captures.

// AgentCommsUserMessage is the protobuf transmitted over the WebRTC DataChannel
// for real-time bidirectional UI and transcript synchronization.
message AgentCommsUserMessage {
    AgentCommsMessageType type = 1;
    string content = 2;
    // Field 4 carries the typed event payload observed in live captures.
    AgentCommsPayload payload = 4;
}

enum AgentCommsMessageType {
    AGENT_COMMS_MESSAGE_TYPE_UNSPECIFIED = 0;
    USER_UTTERANCE = 1;     // Real-time text transcript of user's speech
    AGENT_UTTERANCE = 2;    // Real-time text transcript of AI host's speech
    TTS_EVENT = 3;          // Text-to-speech lifecycle hooks
    SEND_AUDIO_EVENT = 4;   // Audio payload transmission triggers
    GROUNDED_AGENT_CUSTOM_MESSAGE = 5;  // Control frame observed in live captures
    PLAYBACK_EVENT = 6;     // Client-side media playback state sync
    MICROPHONE_EVENT = 7;   // Microphone active/muted state sync
    STATUS_MESSAGE = 8;     // Connection diagnostics and state updates
}

message GroundedAgentCustomMessage {
    bytes raw = 1;
}

message StatusMessagePayload {
    // Field 1 carries the human-readable status string when present.
    string text = 1;
}

// AgentCommsPayload reconstructs the typed DataChannel payload at field 4.
// The sub-field numbers match AgentCommsMessageType values.
message AgentCommsPayload {
    UserUtterance user_utterance = 1;
    AgentUtterance agent_utterance = 2;
    TTSEvent tts_event = 3;
    SendAudioEvent send_audio_event = 4;
    GroundedAgentCustomMessage grounded_agent_custom_message = 5;
    PlaybackEvent playback_event = 6;
    MicrophoneEvent microphone_event = 7;
    StatusMessagePayload status_message = 8;
}

message UserUtterance {
    string transcript = 3;
    bool is_final = 4;
    string utterance_id = 5;
}

message AgentUtterance {
    int32 speaker_id = 1;
    repeated string speakers = 2;
    string transcript_text = 3;
    bool is_final = 4;
    string utterance_id = 5;
}

message TTSTimestamp {
    int64 epoch_sec = 1;
    int32 nanos = 2;
}

message TTSEvent {
    int32 event_type = 1;
    string utterance_id = 2;
    int32 segment_idx = 3;
    TTSTimestamp timestamp = 4;
}

message SendAudioEvent {
    int32 trigger_type = 1;
    string utterance_id = 2;
}

message PlaybackEvent {
    repeated string states = 1;
}

message MicrophoneEvent {
    int32 status_code = 1;
}

message FetchInteractivityTokenRequest {
    // Wire format: [] (empty payload)
}

message FetchInteractivityTokenResponse {
    string token = 1;
}
