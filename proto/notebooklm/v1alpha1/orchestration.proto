// SDPExchange (eyWvXc): WebRTC SDP offer/answer exchange. HAR-verified
// (docs/captures/notebooklm.google.com.jsonl:25, 2026-04-06) — request
// args = [json_str] where json_str is `{"sdp":"...","type":"offer"}`.
// Response is `[json_str]` where json_str is the answer SDP wrapped
// the same way, with `"type":"answer"` and an active fingerprint.
//
// Encoded/decoded by interactiveaudio.exchangeSDP (signaling.go:52).
// The wire keeps the SDP as an opaque JSON-encoded string blob; this
// proto exposes the decoded sdp+type pair for callers that prefer
// structured access.
message SDPExchangeRequest {
    // Raw JSON string sent on the wire — kept as a string because the
    // server treats it opaquely and round-trips byte-for-byte.
    string offer_payload = 1;
}

message SDPExchangeResponse {
    string answer_payload = 1;
}

// GetLabels (I3xc3c). HAR-verified label/autolabel query. The
// notebook UI fires this on every notebook load to render the
// source-list section headers; an empty response means the user
// hasn't yet computed labels for this notebook.
message GetLabelsRequest {
    string project_id = 1;
}

message GetLabelsResponse {
    repeated Label labels = 1;
}

// Label is one autolabel cluster. The trailing "" in the wire tuple
// appears to be reserved for a per-label description (always empty
// in captures); not modeled here until a populated case is observed.
message Label {
    string name = 1;             // e.g. "Generated Code", "Testing", "RPC and Networking"
    string label_id = 2;         // server-assigned UUID
    repeated string source_ids = 3;  // members of this cluster
}

// PlaybackPosition is a positional (seconds, nanos) tuple that mirrors
// google.protobuf.Duration's two int fields. Used inside ArtifactUserState
// to record the listener's place in an interactive audio overview.
message PlaybackPosition {
    int64 seconds = 1;
    int32 nanos = 2;
}

// ArtifactUserState is the per-user, per-artifact state the orchestration
// service persists. Today the only observed payload is a single repeated
// PlaybackPosition recording the user's last playback position in an
// audio overview; the field is repeated to leave room for additional
// markers (resume points, chapter offsets) that the UI may emit later.
//
// Wire shape (HAR-verified 2026-04-25): [[[seconds, nanos]]]
//
// That is: ArtifactUserState is a message with field 1 = repeated
// PlaybackPosition, and a single PlaybackPosition encodes positionally
// as [seconds, nanos].
message ArtifactUserState {
    repeated PlaybackPosition playback_position = 1;
}

// UpsertArtifactUserState (Fxmvse). HAR-verified 2026-04-25 against
// NotebookLM web UI interactive-audio capture set
// (22 samples; web UI fires this every ~5s during interactive
// audio-overview playback to persist the listener's playback position).
//
// Wire request: [%context%, %artifact_id%, %state%]
//   - context: standard project_context request envelope
//   - artifact_id: UUID of the artifact (audio overview)
//   - state: ArtifactUserState — encodes [[[seconds, nanos]]]
//
// The same ArtifactUserState value is also emitted inline in each
// gArtLc (ListArtifacts) artifact tuple at a late field position; that
// inline copy is what the UI reads on page load.
message UpsertArtifactUserStateRequest {
    Context context = 1;
    string artifact_id = 2;
    ArtifactUserState state = 3;
}

// UpsertArtifactUserStateResponse echoes the persisted state.
//
// Wire response: [[[[seconds, nanos]]]]  — a single ArtifactUserState
// value (which is itself [[[seconds, nanos]]]) wrapped at field 1.
message UpsertArtifactUserStateResponse {
    ArtifactUserState state = 1;
}

// GetArtifactUserState (ulBSjf). Read companion to
// UpsertArtifactUserState (Fxmvse).
//
// No HAR observed for the dedicated read path: the value is also
// returned inline by gArtLc (ListArtifacts) as part of each artifact
// tuple, and the UI reads it from there. The fields below mirror the
// HAR-verified write side; the request likely sends only the
// artifact_id, and the response is expected to wrap a single
// ArtifactUserState the same way as UpsertArtifactUserStateResponse.
// TODO(har): capture a standalone ulBSjf request to confirm.
message GetArtifactUserStateRequest {
    string artifact_id = 1;
}

message GetArtifactUserStateResponse {
    ArtifactUserState state = 1;
}

