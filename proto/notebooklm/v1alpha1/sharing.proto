// Sharing service definitions discovered from JavaScript analysis
syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "notebooklm/v1alpha1/notebooklm.proto";
import "notebooklm/v1alpha1/rpc_extensions.proto";

package notebooklm.v1alpha1;

option go_package = "github.com/tmc/nlm/gen/notebooklm/v1alpha1;notebooklm";

// Sharing-related messages

message ShareAudioRequest {
    repeated int32 share_options = 1;  // e.g., [0] for private, [1] for public
    string project_id = 2;
}

message ShareAudioResponse {
    repeated string share_info = 1;  // [share_url, share_id]
}

// GetProjectDetailsRequest. JS bundle confirms the canonical service
// name: JFMDGd → /LabsTailwindSharingService.GetProjectDetails. The
// Go-side field name `share_id` is historical; HAR shows the wire
// accepts the project_id (not a share-link slug). Captured against
// 12+ notebooks in NotebookLM web UI captures (2026-04-06..2026-04-23).
//
// Wire request: [project_id, [2]]
//   [1] = [2] is an opaque mode flag (constant across all observed
//   calls); other modes might surface different response payload
//   shapes but have not been observed.
message GetProjectDetailsRequest {
    // Field is named share_id for backwards compatibility with
    // existing Go callers (api.Client.GetProjectDetails); on the wire
    // this is the project UUID.
    string share_id = 1;
}

// ProjectDetails. The captured response in our corpus carries only
// the collaborators payload, not the title/emoji/thumbnail that the
// fields below also model. The legacy fields are retained for
// backward compatibility with consumers of the generated protos and
// may populate under request modes other than [2] (none observed
// yet).
//
// HAR-verified shape:
//
//   [
//     [<owner_entry>, <collaborator_entry>, ...],
//     <flags|null>,         // [true,true] when fully public, null o/w
//     1000,                 // opaque limit
//     true,
//     null,
//     null,
//     [3, true, true],      // permissions blob (newer captures only)
//   ]
//
//   Entry per user:
//     [email, role_int, [], [display_name, avatar_url]]
//
//     role_int 1 = OWNER (the only role observed in single-user captures)
//
// api.Client.parseProjectDetailsResponse (client.go:4463) extracts
// only OwnerName + IsPublic.
message ProjectDetails {
    string project_id = 1;
    string title = 2;
    string emoji = 3;
    string owner_name = 4;       // populated from owner entry's display_name
    bool is_public = 5;          // populated from response [1] flags array
    google.protobuf.Timestamp shared_at = 6;
    repeated SourceSummary sources = 7;
    // Collaborator list reflects the wire's primary payload.
    repeated ProjectCollaborator collaborators = 8;
}

// ProjectCollaborator captures the actual per-user wire entry.
//   role_int observed values: 1 = OWNER. Other roles will appear once a
//   notebook with multiple collaborators is captured.
message ProjectCollaborator {
    string email = 1;
    int32 role = 2;
    string display_name = 3;
    string avatar_url = 4;
}

message SourceSummary {
    string source_id = 1;
    string title = 2;
    SourceType source_type = 3;
}

message ShareProjectRequest {
    string project_id = 1;
    ShareSettings settings = 2;
}

message ShareSettings {
    bool is_public = 1;
    repeated string allowed_emails = 2;
    bool allow_comments = 3;
    bool allow_downloads = 4;
    google.protobuf.Timestamp expiry_time = 5;
}

message ShareProjectResponse {
    string share_url = 1;
    string share_id = 2;
    ShareSettings settings = 3;
}

// CreateAccessRequest (n3dkHd). Sent when a non-collaborator opens a
// shared notebook URL and clicks "Request access". wire shape
// unverified.
message CreateAccessRequestRequest {
    string project_id = 1;
    string requester_message = 2;
}

message CreateAccessRequestResponse {
    string request_id = 1;
}

// Guidebook-related messages
message Guidebook {
    string guidebook_id = 1;
    string project_id = 2;
    string title = 3;
    string content = 4;
    GuidebookStatus status = 5;
    google.protobuf.Timestamp published_at = 6;
}

enum GuidebookStatus {
    GUIDEBOOK_STATUS_UNSPECIFIED = 0;
    GUIDEBOOK_STATUS_DRAFT = 1;
    GUIDEBOOK_STATUS_PUBLISHED = 2;
    GUIDEBOOK_STATUS_ARCHIVED = 3;
}

message DeleteGuidebookRequest {
    string guidebook_id = 1;
}

message GetGuidebookRequest {
    string guidebook_id = 1;
}

message ListRecentlyViewedGuidebooksRequest {
    int32 page_size = 1;
    string page_token = 2;
}

message ListRecentlyViewedGuidebooksResponse {
    repeated Guidebook guidebooks = 1;
    string next_page_token = 2;
}

message PublishGuidebookRequest {
    string guidebook_id = 1;
    PublishSettings settings = 2;
}

message PublishSettings {
    bool is_public = 1;
    repeated string tags = 2;
}

message PublishGuidebookResponse {
    Guidebook guidebook = 1;
    string public_url = 2;
}

message GetGuidebookDetailsRequest {
    string guidebook_id = 1;
}

message GuidebookDetails {
    Guidebook guidebook = 1;
    repeated GuidebookSection sections = 2;
    GuidebookAnalytics analytics = 3;
}

message GuidebookSection {
    string section_id = 1;
    string title = 2;
    string content = 3;
    int32 order = 4;
}

message GuidebookAnalytics {
    int32 view_count = 1;
    int32 share_count = 2;
    google.protobuf.Timestamp last_viewed = 3;
}

message ShareGuidebookRequest {
    string guidebook_id = 1;
    ShareSettings settings = 2;
}

message ShareGuidebookResponse {
    string share_url = 1;
    string share_id = 2;
}

message GuidebookGenerateAnswerRequest {
    string guidebook_id = 1;
    string question = 2;
    GenerateAnswerSettings settings = 3;
}

message GenerateAnswerSettings {
    int32 max_length = 1;
    float temperature = 2;
    bool include_sources = 3;
}

message GuidebookGenerateAnswerResponse {
    string answer = 1;
    repeated SourceReference sources = 2;
    float confidence_score = 3;
}

message SourceReference {
    string source_id = 1;
    string title = 2;
    string excerpt = 3;
}

// Service definitions
service LabsTailwindSharingService {
    // Audio sharing
    rpc ShareAudio(ShareAudioRequest) returns (ShareAudioResponse) {
        option (rpc_id) = "RGP97b";
        option (arg_format) = "[%share_options%, %project_id%]";
    }
    
    // Project sharing
    rpc GetProjectDetails(GetProjectDetailsRequest) returns (ProjectDetails) {
        option (rpc_id) = "JFMDGd";
        option (arg_format) = "[%share_id%]";
    }
    rpc ShareProject(ShareProjectRequest) returns (ShareProjectResponse) {
        option (rpc_id) = "QDyure";
        option (arg_format) = "[%project_id%, %settings%]";
    }

    // CreateAccessRequest (n3dkHd). Sent when a non-collaborator opens
    // a shared notebook URL and clicks "Request access". JS-bundle-
    // verified; no HAR yet.
    // TODO(har): trigger by opening a private share link from a logged-
    // in account that lacks access.
    rpc CreateAccessRequest(CreateAccessRequestRequest) returns (CreateAccessRequestResponse) {
        option (rpc_id) = "n3dkHd";
        // wire shape unverified; capture HAR before encoding
    }
}

service LabsTailwindGuidebooksService {
    // Guidebook operations
    rpc DeleteGuidebook(DeleteGuidebookRequest) returns (google.protobuf.Empty) {
        option (rpc_id) = "ARGkVc";
        option (arg_format) = "[%guidebook_id%]";
    }
    rpc GetGuidebook(GetGuidebookRequest) returns (Guidebook) {
        option (rpc_id) = "EYqtU";
        option (arg_format) = "[%guidebook_id%]";
    }
    rpc ListRecentlyViewedGuidebooks(ListRecentlyViewedGuidebooksRequest) returns (ListRecentlyViewedGuidebooksResponse) {
        option (rpc_id) = "YJBpHc";
        option (arg_format) = "[%page_size%, %page_token%]";
    }
    rpc PublishGuidebook(PublishGuidebookRequest) returns (PublishGuidebookResponse) {
        option (rpc_id) = "R6smae";
        option (arg_format) = "[%guidebook_id%, %settings%]";
    }
    rpc GetGuidebookDetails(GetGuidebookDetailsRequest) returns (GuidebookDetails) {
        option (rpc_id) = "LJyzeb";
        option (arg_format) = "[%guidebook_id%]";
    }
    rpc ShareGuidebook(ShareGuidebookRequest) returns (ShareGuidebookResponse) {
        option (rpc_id) = "OTl0K";
        option (arg_format) = "[%guidebook_id%, %settings%]";
    }
    rpc GuidebookGenerateAnswer(GuidebookGenerateAnswerRequest) returns (GuidebookGenerateAnswerResponse) {
        option (rpc_id) = "itA0pc";
        option (arg_format) = "[%guidebook_id%, %question%, %settings%]";
    }
}